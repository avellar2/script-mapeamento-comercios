let sortField = 'relevancia';
let sortAsc = false;

function badgeClass(nicho) {
    const map = {
        'dentista': 'badge-dentista',
        'advogado': 'badge-advogado',
        'clínica estética': 'badge-estetica',
        'academia': 'badge-academia',
        'salão de beleza': 'badge-salao',
        'barbearia': 'badge-barbearia',
    };
    return map[nicho] || 'badge-dentista';
}

function renderStats(data) {
    const comTel = data.filter(l => l.telefone).length;
    const comWa = data.filter(l => l.whatsapp).length;
    const comEmail = data.filter(l => l.email).length;
    const comInsta = data.filter(l => l.instagram).length;
    const semSite = data.filter(l => !l.website).length;

    document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="number">${data.length}</div><div class="label">Leads</div></div>
        <div class="stat-card highlight"><div class="number">${comEmail}</div><div class="label">Com Email</div></div>
        <div class="stat-card"><div class="number">${comTel}</div><div class="label">Com Telefone</div></div>
        <div class="stat-card"><div class="number">${comWa}</div><div class="label">Com WhatsApp</div></div>
        <div class="stat-card"><div class="number">${comInsta}</div><div class="label">Com Instagram</div></div>
        <div class="stat-card warning"><div class="number">${semSite}</div><div class="label">Sem Site</div></div>
    `;
}

function render(data) {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    data.forEach((l, i) => {
        const rowClass = !l.website ? 'sem-site' : (l.email ? 'com-email' : '');
        const scoreClass = l.relevancia >= 8 ? 'score-high' : (l.relevancia >= 5 ? 'score-mid' : 'score-low');
        const tr = document.createElement('tr');
        tr.className = rowClass;
        tr.innerHTML = `
            <td class="row-num">${i + 1}</td>
            <td class="nome">${l.nome || ''}</td>
            <td><span class="badge ${badgeClass(l.nicho)}">${l.nicho}</span></td>
            <td>${l.cidade || ''}</td>
            <td>${l.telefone || '<span class="no-data">-</span>'}</td>
            <td>${l.whatsapp ? '<a href="https://wa.me/' + l.whatsapp.replace(/\\D/g,'') + '" target="_blank">' + l.whatsapp + '</a>' : '<span class="no-data">-</span>'}</td>
            <td>${l.email ? '<a href="mailto:' + l.email + '">' + l.email + '</a>' : '<span class="no-data">-</span>'}</td>
            <td>${l.instagram ? '<a href="https://instagram.com/' + l.instagram.replace('@','') + '" target="_blank">' + l.instagram + '</a>' : '<span class="no-data">-</span>'}</td>
            <td><span class="score ${scoreClass}">${l.relevancia || 0}</span></td>
            <td class="obs">${l.observacao || ''}</td>
        `;
        tbody.appendChild(tr);
    });
    document.getElementById('countLabel').textContent = `${data.length} leads`;
}

function ordenar(field) {
    if (sortField === field) { sortAsc = !sortAsc; } else { sortField = field; sortAsc = true; }
    const sorted = [...getFiltered()].sort((a, b) => {
        let va = a[field] || '', vb = b[field] || '';
        if (field === 'relevancia') { va = +va; vb = +vb; }
        return sortAsc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });
    renderStats(sorted);
    render(sorted);
}

function getFiltered() {
    const nicho = document.getElementById('filterNicho').value;
    const cidade = document.getElementById('filterCidade').value;
    const contato = document.getElementById('filterContato').value;
    const nome = document.getElementById('filterNome').value.toLowerCase();
    return leads.filter(l => {
        if (nicho && l.nicho !== nicho) return false;
        if (cidade && l.cidade !== cidade) return false;
        if (contato === 'email' && !l.email) return false;
        if (contato === 'whatsapp' && !l.whatsapp) return false;
        if (contato === 'semsite' && l.website) return false;
        if (nome && !l.nome.toLowerCase().includes(nome)) return false;
        return true;
    }).sort((a, b) => {
        let va = a[sortField] || '', vb = b[sortField] || '';
        if (sortField === 'relevancia') { va = +va; vb = +vb; }
        return sortAsc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });
}

function filtrar() {
    const filtered = getFiltered();
    renderStats(filtered);
    render(filtered);
}

cidades.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });

sortField = 'relevancia'; sortAsc = false;
renderStats(leads);
render(leads.sort((a, b) => (b.relevancia || 0) - (a.relevancia || 0)));
